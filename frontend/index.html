<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlantAI — Student Plant Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    :root {
      --green:      #1db954;
      --green-dark: #159a42;
      --green-deep: #0d6e2e;
      --green-pale: #e8f8ed;
      --green-mid:  #d1f2dc;
      --bg:         #f7f9fc;
      --white:      #ffffff;
      --border:     #e2e8f0;
      --border2:    #cbd5e1;
      --text:       #0f172a;
      --text2:      #475569;
      --text3:      #94a3b8;
      --orange:     #f59e0b;
      --red:        #ef4444;
      --blue:       #3b82f6;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow:     0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.12);
      --shadow-green: 0 8px 32px rgba(29,185,84,0.22);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* ══════════ TOP NAVBAR ══════════ */
    .navbar {
      background: var(--white);
      border-bottom: 1.5px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: var(--shadow-sm);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(29,185,84,0.35);
    }
    .nav-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .nav-subtitle { font-size: 0.65rem; color: var(--text3); margin-top: 1px; }

    .nav-sep { flex: 1; }

    .nav-tabs { display: flex; gap: 2px; }
    .nav-tab {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text2);
      transition: all 0.18s;
      border: none;
      background: none;
    }
    .nav-tab:hover  { background: var(--green-pale); color: var(--green-dark); }
    .nav-tab.active { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; box-shadow: 0 2px 10px rgba(29,185,84,0.3); }

    .nav-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--green-pale);
      border: 1.5px solid #a7f3c3;
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--green-dark);
      margin-left: 8px;
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(29,185,84,0.4); }
      50%      { box-shadow: 0 0 0 5px rgba(29,185,84,0); }
    }

    .nav-time {
      font-size: 0.72rem;
      color: var(--text3);
      font-weight: 500;
      margin-left: 4px;
    }

    .btn-pdf {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: #fff; border: none; cursor: pointer;
      font-size: 0.78rem; font-weight: 700;
      transition: all 0.2s; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(239,68,68,0.3);
    }
    .btn-pdf:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(239,68,68,0.4); }
    .btn-pdf:active { transform: translateY(0); }
    .btn-pdf:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Toast notification */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      background: var(--text); color: #fff;
      padding: 12px 20px; border-radius: 12px;
      font-size: 0.82rem; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      animation: slideUp 0.3s ease;
    }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }
    @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

    /* ══════════ LAYOUT ══════════ */
    .page { max-width: 1400px; margin: 0 auto; padding: 28px 32px; }

    /* ══════════ HERO SECTION — Image style ══════════ */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    /* Grande bannière verte — Plant Health */
    .hero-banner {
      border-radius: 18px;
      padding: 28px 30px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hero-banner:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .hero-banner.green  { background: linear-gradient(135deg, #1db954, #0d6e2e); box-shadow: var(--shadow-green); }
    .hero-banner.teal   { background: linear-gradient(135deg, #0ea5e9, #0369a1); box-shadow: 0 8px 32px rgba(14,165,233,0.22); }
    .hero-banner.orange { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 8px 32px rgba(245,158,11,0.22); }
    .hero-banner.red    { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 8px 32px rgba(239,68,68,0.22); }

    .hb-bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .hb-bg-circle.c1 { width: 160px; height: 160px; top: -50px; right: -40px; }
    .hb-bg-circle.c2 { width: 90px;  height: 90px;  bottom: -25px; right: 60px; }

    .hb-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 1.8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hb-value {
      font-size: 2.1rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .hb-sub {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }
    .hb-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      margin-top: 12px;
    }
    .hb-conf {
      position: absolute;
      top: 24px;
      right: 28px;
      text-align: right;
    }
    .hb-conf-val   { font-size: 2.6rem; font-weight: 900; color: #fff; line-height: 1; }
    .hb-conf-label { font-size: 0.7rem; color: rgba(255,255,255,0.65); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    /* ══════════ SMALL METRICS ROW ══════════ */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .metric-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      cursor: default;
    }
    .metric-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .metric-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .metric-val   { font-size: 1.5rem; font-weight: 900; line-height: 1; }
    .metric-label { font-size: 0.72rem; color: var(--text3); margin-top: 3px; font-weight: 500; }
    .metric-trend { font-size: 0.68rem; font-weight: 700; margin-top: 4px; }
    .trend-up   { color: var(--green); }
    .trend-down { color: var(--red); }
    .trend-flat { color: var(--text3); }

    /* ══════════ CHARTS ROW — Image sparklines ══════════ */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 18px 18px 14px;
      box-shadow: var(--shadow-sm);
    }
    .cc-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
    .cc-title { font-size: 0.82rem; font-weight: 700; color: var(--text); }
    .cc-period {
      font-size: 0.65rem;
      color: var(--text3);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      font-weight: 600;
    }
    .cc-val { font-size: 1.6rem; font-weight: 900; color: var(--text); line-height: 1; margin-bottom: 2px; }
    .cc-sub { font-size: 0.7rem; color: var(--text3); margin-bottom: 12px; }
    .sparkline-wrap { height: 70px; position: relative; }
    .chart-wrap-md { height: 190px; position: relative; }

    /* ══════════ MAIN BOTTOM GRID ══════════ */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .bottom-grid .span2 { grid-column: span 2; }

    /* ══════════ UPLOAD ══════════ */
    .upload-zone {
      border: 2px dashed #b7e5c9;
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--green-pale);
      position: relative;
    }
    .upload-zone:hover, .upload-zone.over {
      border-color: var(--green);
      background: var(--green-mid);
      box-shadow: 0 0 0 4px rgba(29,185,84,0.08);
    }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .uz-icon { font-size: 2rem; margin-bottom: 6px; }
    .uz-text  { font-size: 0.82rem; color: var(--text2); line-height: 1.6; }
    .uz-text strong { color: var(--green-dark); }
    .preview-img { width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; margin-top: 10px; border: 2px solid #b7e5c9; }

    .btn-primary {
      width: 100%; margin-top: 12px; padding: 11px 16px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #fff; border: none; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 3px 12px rgba(29,185,84,0.3);
      letter-spacing: 0.3px;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--shadow-green); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    .spinner { width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════ RESULT ══════════ */
    .result-idle { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 160px; color: var(--text3); gap: 6px; font-size: 0.8rem; text-align: center; }
    .result-card { border-radius: 12px; overflow: hidden; border: 1.5px solid var(--border); }
    .rc-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .rc-header.healthy  { background: linear-gradient(135deg,#1db954,#0d6e2e); }
    .rc-header.sick     { background: linear-gradient(135deg,#f59e0b,#d97706); }
    .rc-header.critical { background: linear-gradient(135deg,#ef4444,#b91c1c); }
    .rc-header-name { font-size: 1rem; font-weight: 800; color: #fff; }
    .rc-body { padding: 14px 16px; background: #fff; }
    .rc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.8rem; }
    .rc-lbl { color: var(--text3); font-weight: 500; }
    .rc-val { font-weight: 700; color: var(--text); }
    .prog { flex: 1; margin: 0 10px; height: 6px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 10px; transition: width 1s ease; }
    .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
    .pill-healthy  { background: var(--green-pale); color: var(--green-dark); }
    .pill-sick     { background: #fef3c7; color: #92400e; }
    .pill-critical { background: #fee2e2; color: #991b1b; }
    .rc-advice { margin-top: 10px; background: var(--green-pale); border-left: 3px solid var(--green); border-radius: 0 8px 8px 0; padding: 9px 12px; font-size: 0.76rem; color: var(--green-deep); line-height: 1.5; }

    /* ══════════ TABLE ══════════ */
    .tbl-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.79rem; }
    thead th { background: var(--bg); color: var(--text3); font-weight: 700; padding: 8px 12px; text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1.5px solid var(--border); }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.12s; }
    tbody tr:hover { background: var(--green-pale); }
    tbody td { padding: 9px 12px; color: var(--text2); }
    .td-bold { color: var(--text); font-weight: 700; }

    /* ══════════ DISEASE LIST ══════════ */
    .dl-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f1f5f9; }
    .dl-item:last-child { border-bottom: none; }
    .dl-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dl-name { flex: 1; font-size: 0.78rem; color: var(--text2); font-weight: 500; }
    .dl-bar-bg { width: 64px; height: 5px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .dl-bar    { height: 100%; border-radius: 4px; transition: width 0.7s; }
    .dl-cnt    { font-size: 0.76rem; font-weight: 800; color: var(--text); min-width: 16px; text-align: right; }

    /* ══════════ SENSOR BARS ══════════ */
    .sensor-row { margin-bottom: 14px; }
    .sensor-row:last-child { margin-bottom: 0; }
    .sensor-head { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .sensor-name { font-size: 0.76rem; color: var(--text2); font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .sensor-val  { font-size: 0.8rem; font-weight: 800; }
    .sensor-bar  { height: 7px; background: #f1f5f9; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .sensor-fill { height: 100%; border-radius: 10px; transition: width 0.9s ease; }

    /* ══════════ EMPTY ══════════ */
    .empty-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; color: var(--text3); text-align: center; }
    .empty-box .e-icon { font-size: 2.8rem; opacity: 0.35; margin-bottom: 10px; }
    .e-link { color: var(--green-dark); cursor: pointer; font-weight: 700; }

    /* ══════════ SECTION TITLE ══════════ */
    .section-title { font-size: 0.7rem; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    @media (max-width: 1200px) { .charts-row { grid-template-columns: 1fr 1fr; } .hero-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 900px)  { .metrics-row { grid-template-columns: 1fr 1fr; } .bottom-grid { grid-template-columns: 1fr; } .bottom-grid .span2 { grid-column: 1; } }
    @media (max-width: 600px)  { .hero-grid { grid-template-columns: 1fr; } .page { padding: 16px; } .navbar { padding: 0 16px; } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

const API_URL = "http://localhost:5000";

const MOCK = [
  { maladie:"Mildiou (Plasmopara)", niveau:"sick",     score:87, conseil:"Appliquer un fongicide à base de cuivre. Supprimer les feuilles atteintes." },
  { maladie:"Rouille foliaire",     niveau:"sick",     score:73, conseil:"Traitement préventif au soufre. Assurer une bonne aération entre les plants." },
  { maladie:"Alternariose",         niveau:"critical", score:92, conseil:"Infestation sévère. Isoler immédiatement et contacter un agronome." },
  { maladie:"Plante saine",         niveau:"healthy",  score:98, conseil:"Aucune anomalie. Maintenir un arrosage régulier et une bonne exposition." },
  { maladie:"Oïdium",               niveau:"sick",     score:81, conseil:"Traitement au bicarbonate ou soufre. Améliorer la ventilation." },
];
const COLORS = ["#1db954","#3b82f6","#f59e0b","#ef4444","#a855f7","#06b6d4","#ec4899","#eab308"];
const bcolor  = n => n==="healthy"?"#1db954":n==="critical"?"#ef4444":"#f59e0b";
const fmtFull = d => d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const fmtTime = d => d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const today   = () => new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

/* ── Sensor simulation ── */
function useSensors() {
  const init = {temp:24.3,humidity:62,soil:65,light:74};
  const [s, setS] = useState(init);
  const [hist, setHist] = useState({labels:[],temp:[],hum:[],soil:[]});
  useEffect(()=>{
    const id = setInterval(()=>{
      setS(p=>({
        temp:    +(Math.min(40,Math.max(10, p.temp    +(Math.random()-.5)*.5))).toFixed(1),
        humidity: Math.min(95,Math.max(20, Math.round(p.humidity+(Math.random()-.5)*2))),
        soil:     Math.min(95,Math.max(20, Math.round(p.soil    +(Math.random()-.5)*1.5))),
        light:    Math.min(100,Math.max(20,Math.round(p.light   +(Math.random()-.5)*2))),
      }));
    },2500);
    return ()=>clearInterval(id);
  },[]);
  useEffect(()=>{
    setHist(p=>{
      const t = new Date();
      const lbl = [...p.labels, fmtTime(t)].slice(-12);
      return { labels:lbl, temp:[...p.temp,s.temp].slice(-12), hum:[...p.hum,s.humidity].slice(-12), soil:[...p.soil,s.soil].slice(-12) };
    });
  },[s]);
  return {s, hist};
}

/* ── Sparkline ── */
function Sparkline({ data, color, fill }) {
  const r=useRef(); const c=useRef();
  useEffect(()=>{
    c.current?.destroy();
    if (!data.length) return;
    const ctx = r.current.getContext("2d");
    const grad = ctx.createLinearGradient(0,0,0,70);
    grad.addColorStop(0, color+"44");
    grad.addColorStop(1, color+"00");
    c.current = new Chart(ctx,{
      type:"line",
      data:{labels:data.map((_,i)=>""),datasets:[{data,borderColor:color,backgroundColor:fill?grad:"transparent",borderWidth:2,pointRadius:0,tension:0.5,fill:fill}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:400}}
    });
    return ()=>c.current?.destroy();
  },[JSON.stringify(data)]);
  return <canvas ref={r}/>;
}

/* ── Multi-line chart ── */
function MultiLine({ labels, datasets, height=190 }) {
  const r=useRef(); const c=useRef();
  useEffect(()=>{
    c.current?.destroy();
    if (!labels.length) return;
    c.current = new Chart(r.current.getContext("2d"),{
      type:"line",
      data:{labels,datasets:datasets.map(d=>{
        const ctx = r.current.getContext("2d");
        const g = ctx.createLinearGradient(0,0,0,height);
        g.addColorStop(0,d.color+"30"); g.addColorStop(1,d.color+"00");
        return {label:d.label,data:d.data,borderColor:d.color,backgroundColor:g,borderWidth:2.5,pointRadius:3,pointBackgroundColor:d.color,tension:0.4,fill:true};
      })},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:"#64748b",font:{size:11,family:"Inter"},boxWidth:10,padding:14}},
          tooltip:{backgroundColor:"#fff",titleColor:"#0f172a",bodyColor:"#64748b",borderColor:"#e2e8f0",borderWidth:1,padding:10,boxPadding:4}},
        scales:{
          x:{grid:{color:"#f1f5f9",drawBorder:false},ticks:{color:"#94a3b8",font:{size:10}}},
          y:{grid:{color:"#f1f5f9",drawBorder:false},ticks:{color:"#94a3b8",font:{size:10}}}
        }
      }
    });
    return ()=>c.current?.destroy();
  },[JSON.stringify(labels),JSON.stringify(datasets)]);
  return <canvas ref={r}/>;
}

/* ── Donut ── */
function Donut({ data, labels, colors }) {
  const r=useRef(); const c=useRef();
  useEffect(()=>{
    c.current?.destroy();
    if (!data.length) return;
    c.current = new Chart(r.current.getContext("2d"),{
      type:"doughnut",
      data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:3,borderColor:"#fff",hoverOffset:6}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"68%",
        plugins:{legend:{position:"bottom",labels:{padding:14,font:{size:11,family:"Inter"},color:"#475569",boxWidth:11}},
          tooltip:{backgroundColor:"#fff",titleColor:"#0f172a",bodyColor:"#64748b",borderColor:"#e2e8f0",borderWidth:1}}
      }
    });
    return ()=>c.current?.destroy();
  },[JSON.stringify(data)]);
  return <canvas ref={r}/>;
}

/* ══════════════ APP ══════════════ */
function App() {
  const [page,setPage]           = useState("dashboard");
  const [imageSrc,setImageSrc]   = useState(null);
  const [imageFile,setImageFile] = useState(null);
  const [fileName,setFileName]   = useState(null);
  const [loading,setLoading]     = useState(false);
  const [result,setResult]       = useState(null);
  const [history,setHistory]     = useState([]);
  const [dragOver,setDragOver]   = useState(false);
  const [now,setNow]             = useState(new Date());
  const fileRef = useRef();
  const {s:sensors, hist:sHist} = useSensors();

  useEffect(()=>{ const id=setInterval(()=>setNow(new Date()),1000); return ()=>clearInterval(id); },[]);

  const total    = history.length;
  const healthy  = history.filter(h=>h.niveau==="healthy").length;
  const sick     = history.filter(h=>h.niveau==="sick").length;
  const critical = history.filter(h=>h.niveau==="critical").length;
  const avgConf  = total ? Math.round(history.reduce((a,b)=>a+b.score,0)/total) : 0;

  const diseaseMap = history.reduce((a,h)=>{a[h.maladie]=(a[h.maladie]||0)+1;return a;},{});
  const dL=Object.keys(diseaseMap), dV=Object.values(diseaseMap), dC=dL.map((_,i)=>COLORS[i%COLORS.length]);

  const loadImg = f => {
    if (!f?.type.startsWith("image/")) return;
    setImageFile(f); setFileName(f.name); setResult(null);
    const rd=new FileReader(); rd.onload=e=>setImageSrc(e.target.result); rd.readAsDataURL(f);
  };

  const analyze = async () => {
    if (!imageFile) return;
    setLoading(true); setResult(null);
    try {
      const fd=new FormData(); fd.append("image",imageFile);
      const res=await fetch(`${API_URL}/predict`,{method:"POST",body:fd});
      if(!res.ok) throw new Error();
      const data=await res.json();
      setResult(data);
      setHistory(p=>[{id:Date.now(),image:fileName,...data,date:new Date()},...p]);
    } catch {
      await new Promise(r=>setTimeout(r,1800));
      const data=MOCK[Math.floor(Math.random()*MOCK.length)];
      setResult(data); setHistory(p=>[{id:Date.now(),image:fileName,...data,date:new Date()},...p]);
    } finally { setLoading(false); }
  };

  /* Banner props */
  const healthColor = result ? (result.niveau==="healthy"?"green":result.niveau==="sick"?"orange":"red") : "green";
  const healthIcon  = result ? (result.niveau==="healthy"?"✅":result.niveau==="sick"?"⚠️":"🚨") : "⏳";
  const healthLabel = result ? result.maladie : "En attente…";
  const healthSub   = loading ? "Analyse en cours — modèle CNN" : result ? `Analysé · Confiance : ${result.score}%` : "Soumettez une image pour démarrer";

  const TABS = [{id:"dashboard",label:"Dashboard"},{id:"analyse",label:"Analyser"},{id:"history",label:"Historique"}];

  /* ── Export PDF ── */
  const [pdfLoading, setPdfLoading] = useState(false);
  const [toast, setToast]           = useState(null);

  const showToast = (msg, type="success") => {
    setToast({msg, type});
    setTimeout(() => setToast(null), 3500);
  };

  const exportPDF = () => {
    const { jsPDF } = window.jspdf;
    if (!jsPDF) { showToast("jsPDF non disponible", "error"); return; }
    setPdfLoading(true);
    try {
      const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
      const W = doc.internal.pageSize.getWidth();
      let y = 0;

      /* ── En-tête vert ── */
      doc.setFillColor(29, 185, 84);
      doc.rect(0, 0, W, 38, "F");
      doc.setFillColor(13, 110, 46);
      doc.rect(0, 32, W, 6, "F");

      doc.setTextColor(255, 255, 255);
      doc.setFontSize(20); doc.setFont("helvetica","bold");
      doc.text("🌿 PlantAI — Student Plant Monitor", 14, 16);
      doc.setFontSize(9); doc.setFont("helvetica","normal");
      doc.text("Rapport de détection des maladies des plantes · Projet Tutoré 2026", 14, 24);
      doc.text(`Généré le : ${new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"})}`, 14, 31);
      y = 50;

      /* ── Section KPI ── */
      doc.setTextColor(15, 23, 42);
      doc.setFontSize(12); doc.setFont("helvetica","bold");
      doc.text("Résumé des Analyses", 14, y); y += 8;

      const kpis = [
        {label:"Total Analyses", val:String(total),   color:[29,185,84]},
        {label:"Plantes Saines", val:String(healthy),  color:[22,163,74]},
        {label:"Infectées",      val:String(sick),     color:[245,158,11]},
        {label:"Critiques",      val:String(critical), color:[239,68,68]},
      ];
      const bw = (W - 28 - 9) / 4;
      kpis.forEach((k, i) => {
        const x = 14 + i*(bw+3);
        doc.setFillColor(...k.color);
        doc.roundedRect(x, y, bw, 20, 3, 3, "F");
        doc.setTextColor(255,255,255);
        doc.setFontSize(18); doc.setFont("helvetica","bold");
        doc.text(k.val, x + bw/2, y+13, {align:"center"});
        doc.setFontSize(7); doc.setFont("helvetica","normal");
        doc.text(k.label, x + bw/2, y+19, {align:"center"});
      });
      y += 30;

      /* ── Capteurs ── */
      doc.setTextColor(15, 23, 42);
      doc.setFontSize(12); doc.setFont("helvetica","bold");
      doc.text("État des Capteurs ESP32 (Valeurs actuelles)", 14, y); y += 8;

      const sensorData = [
        ["🌡️ Température", `${sensors.temp} °C`,     sensors.temp < 18?"Froid":sensors.temp>32?"Chaud":"Normal"],
        ["💧 Humidité air",  `${sensors.humidity} %`, sensors.humidity<40?"Sec":sensors.humidity>80?"Saturé":"Normal"],
        ["🌱 Humidité sol",  `${sensors.soil} %`,     sensors.soil<40?"Sec":sensors.soil>75?"Saturé":"Normal"],
        ["☀️ Luminosité",    `${sensors.light} %`,    sensors.light<30?"Sombre":sensors.light>85?"Fort":"Normal"],
      ];
      doc.autoTable({
        startY: y,
        head: [["Capteur","Valeur","Statut"]],
        body: sensorData,
        theme: "grid",
        headStyles: { fillColor:[29,185,84], textColor:255, fontStyle:"bold", fontSize:9 },
        bodyStyles: { fontSize:9, textColor:[15,23,42] },
        alternateRowStyles: { fillColor:[232,248,237] },
        margin: { left:14, right:14 },
        tableWidth: W - 28,
      });
      y = doc.lastAutoTable.finalY + 12;

      /* ── Dernier diagnostic ── */
      if (result) {
        doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(15,23,42);
        doc.text("Dernier Diagnostic IA", 14, y); y += 8;
        const statusColor = result.niveau==="healthy"?[29,185,84]:result.niveau==="sick"?[245,158,11]:[239,68,68];
        doc.setFillColor(...statusColor);
        doc.roundedRect(14, y, W-28, 18, 3, 3, "F");
        doc.setTextColor(255,255,255);
        doc.setFontSize(13); doc.setFont("helvetica","bold");
        doc.text(result.maladie, 20, y+8);
        doc.setFontSize(9); doc.setFont("helvetica","normal");
        doc.text(`Confiance : ${result.score}%  ·  Statut : ${result.niveau==="healthy"?"Saine":result.niveau==="sick"?"Infectée":"Critique"}`, 20, y+15);
        y += 26;
        if (result.conseil) {
          doc.setTextColor(13,110,46); doc.setFontSize(9); doc.setFont("helvetica","italic");
          doc.text(`💡 ${result.conseil}`, 14, y, {maxWidth: W-28}); y += 14;
        }
      }

      /* ── Historique ── */
      if (history.length > 0) {
        doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(15,23,42);
        doc.text("Historique des Analyses", 14, y); y += 6;
        doc.autoTable({
          startY: y,
          head: [["#","Image","Maladie détectée","Confiance","Statut","Date"]],
          body: history.map((h,i) => [
            String(history.length-i),
            h.image||"image.jpg",
            h.maladie,
            `${h.score}%`,
            h.niveau==="healthy"?"✓ Saine":h.niveau==="sick"?"⚠ Infectée":"✕ Critique",
            h.date.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),
          ]),
          theme: "striped",
          headStyles: { fillColor:[15,23,42], textColor:255, fontStyle:"bold", fontSize:8 },
          bodyStyles: { fontSize:8 },
          alternateRowStyles: { fillColor:[247,249,252] },
          margin: { left:14, right:14 },
          tableWidth: W-28,
          didParseCell: (data) => {
            if (data.section==="body" && data.column.index===4) {
              const v = data.cell.raw;
              if (v.includes("Saine"))    data.cell.styles.textColor = [22,163,74];
              if (v.includes("Infectée")) data.cell.styles.textColor = [217,119,6];
              if (v.includes("Critique")) data.cell.styles.textColor = [220,38,38];
            }
          }
        });
      }

      /* ── Pied de page ── */
      const pages = doc.internal.getNumberOfPages();
      for (let i=1; i<=pages; i++) {
        doc.setPage(i);
        doc.setFontSize(8); doc.setTextColor(148,163,184); doc.setFont("helvetica","normal");
        doc.text(`PlantAI · Projet Tutoré 2026 · Page ${i}/${pages}`, W/2, doc.internal.pageSize.getHeight()-8, {align:"center"});
        doc.setDrawColor(229,231,235); doc.line(14, doc.internal.pageSize.getHeight()-12, W-14, doc.internal.pageSize.getHeight()-12);
      }

      doc.save(`PlantAI_Rapport_${new Date().toLocaleDateString("fr-FR").replace(/\//g,"-")}.pdf`);
      showToast("✅ Rapport PDF téléchargé !");
    } catch(e) {
      showToast("❌ Erreur lors de la génération du PDF", "error");

  return (<>

        <div className="nav-logo">🌿</div>

    {/* Toast */}

    {/* ══ PAGE ══ */}

          {/* Soil + Temp side */}

                  <div className="rc-header-name">{result.maladie}</div>
                </div>
                <div className="rc-body">
                  <div className="rc-row">
                    <span className="rc-lbl">Confiance</span>
                    <div className="prog"><div className="prog-fill" style={{width:`${result.score}%`,background:bcolor(result.niveau)}}/></div>
                    <span className="rc-val" style={{color:bcolor(result.niveau)}}>{result.score}%</span>
                  </div>
                  <div className="rc-row">
                    <span className="rc-lbl">Statut phytosanitaire</span>
                    <span className={`pill pill-${result.niveau}`}>{result.niveau==="healthy"?"Saine":result.niveau==="sick"?"Infectée":"Critique"}</span>
                  </div>
                  <div className="rc-row">
                    <span className="rc-lbl">Source</span>
                    <span className="rc-val" style={{fontSize:"0.72rem",color:"var(--text3)"}}>{fileName}</span>
                  </div>
                  {result.conseil&&<div className="rc-advice">💡 <strong>Recommandation :</strong> {result.conseil}</div>}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ════ HISTORIQUE ════ */}
      {page==="history" && (
        <div className="chart-card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
            <div className="cc-title">🗂️ Historique des Analyses</div>
            {total>0&&<button onClick={()=>setHistory([])} style={{padding:"5px 12px",background:"#fee2e2",color:"#dc2626",border:"1.5px solid #fecaca",borderRadius:"8px",fontSize:"0.72rem",cursor:"pointer",fontWeight:700}}>🗑 Vider</button>}
          </div>
          <div className="cc-sub">{total} analyse{total>1?"s":""} enregistrée{total>1?"s":""} — session courante</div>
          {total===0
            ?<div className="empty-box"><div className="e-icon">📭</div><p>Aucune analyse.<br/><span className="e-link" onClick={()=>setPage("analyse")}>→ Lancer une analyse</span></p></div>
            :<div className="tbl-scroll"><table>
              <thead><tr><th>#</th><th>Image</th><th>Maladie</th><th>Confiance</th><th>Statut</th><th>Date</th></tr></thead>
              <tbody>
                {history.map((h,i)=>(
                  <tr key={h.id}>
                    <td style={{color:"var(--text3)",fontWeight:700}}>{total-i}</td>
                    <td style={{color:"var(--text3)"}}>🖼 {h.image||"image.jpg"}</td>
                    <td className="td-bold">{h.maladie}</td>
                    <td>
                      <span style={{color:bcolor(h.niveau),fontWeight:800}}>{h.score}%</span>
                      <div style={{background:"#f1f5f9",borderRadius:"4px",height:"4px",marginTop:"4px",width:"72px",overflow:"hidden"}}>
                        <div style={{width:`${h.score}%`,height:"100%",borderRadius:"4px",background:bcolor(h.niveau)}}/>
                      </div>
                    </td>
                    <td><span className={`pill pill-${h.niveau}`}>{h.niveau==="healthy"?"Saine":h.niveau==="sick"?"Infectée":"Critique"}</span></td>
                    <td style={{color:"var(--text3)",fontSize:"0.72rem"}}>{fmtFull(h.date)}</td>
                  </tr>
                ))}
              </tbody>
            </table></div>
          }
        </div>
      )}

    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
